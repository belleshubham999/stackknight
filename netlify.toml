[build]
  command = "echo 'No build needed'"
  publish = "."

[[redirects]]
  from = "/api/poki"
  to = "https://poki.com/en/g/stack-knight"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
